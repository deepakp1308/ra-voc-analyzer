name: R&A VOC Analyzer — Weekly Report

on:
  schedule:
    # 07:00 UTC Monday = 23:00 PST Sunday (previous night)
    # Pipeline takes ~60min → dashboard ready by 01:00 AM PST Monday
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      backfill_from:
        description: 'ISO date to backfill from (e.g., 2025-01-01). Leave empty for incremental.'
        required: false
        type: string

env:
  TZ: America/Los_Angeles
  PYTHON_VERSION: '3.11'

jobs:
  voc-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Download previous database (if exists)
        uses: actions/download-artifact@v4
        with:
          name: voc-database
          path: data/
        continue-on-error: true  # First run won't have an artifact

      # ── Gate 1: Unit Tests ──────────────────────────────────────────────
      - name: "Gate 1: Unit Tests"
        run: pytest tests/unit/ -v --timeout=60

      # ── Gate 2: Property-Based Tests ────────────────────────────────────
      - name: "Gate 2: Property Tests"
        run: pytest tests/property/ -v --timeout=120

      # ── Run Full Pipeline ───────────────────────────────────────────────
      - name: Run pipeline (incremental or backfill)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPORT_RECIPIENT_SLACK_ID: ${{ secrets.REPORT_RECIPIENT_SLACK_ID }}
        run: |
          if [ -n "${{ inputs.backfill_from }}" ]; then
            python -m voc_agent.cli ingest --backfill "${{ inputs.backfill_from }}"
            python -m voc_agent.cli classify
            python -m voc_agent.cli analyze
            python -m voc_agent.cli report
          else
            python -m voc_agent.cli run-all
          fi

      # ── Gate 3: Data Contract Validation ────────────────────────────────
      - name: "Gate 3: Data Contracts"
        run: pytest tests/contract/ -v --timeout=60

      # ── Gate 4: Report Integrity Checks ─────────────────────────────────
      - name: "Gate 4: Report Integrity"
        run: python -m qa_checks --mode report

      # ── Gate 6: Cost & Performance Budget ───────────────────────────────
      - name: "Gate 6: Budget Check"
        run: python -m qa_checks --mode budget

      # ── Upload Database Artifact ────────────────────────────────────────
      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: voc-database
          path: data/voc.db
          retention-days: 90

      # ── Upload Report Artifacts ─────────────────────────────────────────
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: |
            docs/index.html
            docs/archive/
            reports/*.pdf
          retention-days: 90

      # ── Deploy to GitHub Pages ──────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Preserve archive from previous runs

      # ── Slack DM Delivery ───────────────────────────────────────────────
      - name: Deliver report via Slack DM
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          REPORT_RECIPIENT_SLACK_ID: ${{ secrets.REPORT_RECIPIENT_SLACK_ID }}
        run: python -m voc_agent.reporting.slack_delivery

  # ── Failure Notification ──────────────────────────────────────────────────
  notify-failure:
    needs: voc-pipeline
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install slack-sdk
        run: pip install slack-sdk

      - name: Notify Deepak of failure
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          REPORT_RECIPIENT_SLACK_ID: ${{ secrets.REPORT_RECIPIENT_SLACK_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python -c "
          import os
          from slack_sdk import WebClient
          client = WebClient(token=os.environ['SLACK_BOT_TOKEN'])
          client.chat_postMessage(
              channel=os.environ['REPORT_RECIPIENT_SLACK_ID'],
              text=f':red_circle: *R&A VOC Analyzer failed this week.*\n'
                   f'Check the logs: {os.environ[\"GITHUB_RUN_URL\"]}',
          )
          "
